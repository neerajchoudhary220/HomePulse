<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HomePulse • Virtual ESP8266 Simulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-main: #0a0b10;
      --bg-card: rgba(20, 22, 34, 0.45);
      --border-card: rgba(255, 255, 255, 0.08);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      
      --color-green: hsl(145, 85%, 50%);
      --color-red: hsl(355, 85%, 55%);
      --color-blue: hsl(210, 90%, 60%);
      --color-gold: hsl(42, 95%, 55%);
      
      --glow-blue: 0 0 25px hsla(210, 90%, 60%, 0.4);
      --glow-green: 0 0 25px hsla(145, 85%, 50%, 0.4);
      --glow-red: 0 0 25px hsla(355, 85%, 55%, 0.4);
      
      --font-primary: 'Inter', sans-serif;
      --font-title: 'Outfit', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      font-family: var(--font-primary);
      background-color: var(--bg-main);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
      touch-action: pan-x pan-y;
    }

    /* Ambient background glowing circles */
    body::before, body::after {
      content: '';
      position: absolute;
      width: 350px;
      height: 350px;
      border-radius: 50%;
      z-index: -1;
      filter: blur(120px);
      opacity: 0.25;
      pointer-events: none;
    }
    body::before {
      background: var(--color-blue);
      top: 10%;
      left: 10%;
    }
    body::after {
      background: var(--color-red);
      bottom: 10%;
      right: 10%;
    }

    .sim-card {
      width: 100%;
      max-width: 520px;
      background: var(--bg-card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-card);
      border-radius: 24px;
      padding: 2.2rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      gap: 1.8rem;
    }

    .sim-header {
      text-align: center;
      border-bottom: 1px solid var(--border-card);
      padding-bottom: 1.2rem;
    }

    .sim-header h1 {
      font-family: var(--font-title);
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #fff 30%, var(--color-blue) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.25rem;
    }

    .sim-header p {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .status-badge-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 255, 255, 0.03);
      padding: 0.85rem 1.2rem;
      border-radius: 14px;
      border: 1px solid var(--border-card);
    }

    .status-label {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .sim-status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: var(--font-title);
      font-weight: 700;
      font-size: 0.9rem;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--text-muted);
      transition: all 0.3s ease;
    }

    .sim-status.connected {
      color: var(--color-green);
      text-shadow: 0 0 8px hsla(145, 85%, 50%, 0.4);
    }
    .sim-status.connected .status-dot {
      background: var(--color-green);
      box-shadow: var(--glow-green);
      animation: pulse 1.5s infinite;
    }

    .sim-status.disconnected {
      color: var(--color-red);
      text-shadow: 0 0 8px hsla(355, 85%, 55%, 0.4);
    }
    .sim-status.disconnected .status-dot {
      background: var(--color-red);
      box-shadow: var(--glow-red);
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .input-group label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-field {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid var(--border-card);
      border-radius: 12px;
      padding: 0.85rem 1rem;
      color: #fff;
      font-family: monospace;
      font-size: 0.85rem;
      width: 100%;
      outline: none;
      transition: all 0.2s ease;
    }

    .input-field:focus {
      border-color: var(--color-blue);
      box-shadow: 0 0 10px rgba(59, 130, 246, 0.25);
    }

    .btn {
      font-family: var(--font-title);
      font-weight: 700;
      font-size: 0.95rem;
      padding: 0.9rem 1.5rem;
      border-radius: 14px;
      border: 1px solid transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .btn-connect {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #fff;
      box-shadow: var(--glow-blue);
    }

    .btn-connect:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 30px hsla(210, 90%, 60%, 0.55);
    }

    .btn-connect.connected {
      background: linear-gradient(135deg, #dc2626, #b91c1c);
      box-shadow: var(--glow-red);
    }

    .btn-connect.connected:hover {
      box-shadow: 0 0 30px hsla(355, 85%, 55%, 0.55);
    }

    .sensor-controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .btn-power {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border-card);
      color: var(--text-secondary);
    }

    .btn-power:not(:disabled):hover {
      transform: translateY(-2px);
    }

    .btn-power-on:not(:disabled):hover {
      border-color: var(--color-green);
      background: hsla(145, 85%, 50%, 0.1);
      color: var(--color-green);
      box-shadow: 0 0 15px hsla(145, 85%, 50%, 0.15);
    }

    .btn-power-off:not(:disabled):hover {
      border-color: var(--color-red);
      background: hsla(355, 85%, 55%, 0.1);
      color: var(--color-red);
      box-shadow: 0 0 15px hsla(355, 85%, 55%, 0.15);
    }

    .btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }

    .console-panel {
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid var(--border-card);
      border-radius: 16px;
      padding: 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .console-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding-bottom: 0.5rem;
    }

    .console-title {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn-clear {
      font-size: 0.7rem;
      color: var(--text-muted);
      background: transparent;
      border: none;
      cursor: pointer;
    }

    .btn-clear:hover {
      color: var(--text-primary);
    }

    .console-logs {
      font-family: monospace;
      font-size: 0.8rem;
      max-height: 120px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      color: #a9b7c6;
    }

    .log-line {
      line-height: 1.4;
      border-left: 2px solid transparent;
      padding-left: 0.5rem;
    }

    .log-line.info {
      border-color: var(--color-blue);
      color: #61afef;
    }

    .log-line.tx {
      border-color: var(--color-gold);
      color: #e5c07b;
    }

    .log-line.err {
      border-color: var(--color-red);
      color: #e06c75;
    }

    .console-logs::-webkit-scrollbar {
      width: 4px;
    }
    .console-logs::-webkit-scrollbar-track {
      background: transparent;
    }
    .console-logs::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
    }

    @keyframes pulse {
      0% { opacity: 0.6; }
      50% { opacity: 1; }
      100% { opacity: 0.6; }
    }

    @media (max-width: 480px) {
      .sim-card {
        padding: 1.5rem;
      }
      .sensor-controls {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <div class="sim-card">
    <div class="sim-header">
      <h1>ESP8266 Virtual Simulator</h1>
      <p>Simulate grid power sensor hardware for HomePulse testing</p>
    </div>

    <!-- Status Badge -->
    <div class="status-badge-container">
      <span class="status-label">Simulator Status:</span>
      <div class="sim-status disconnected" id="simStatus">
        <span class="status-dot"></span>
        <span class="status-text">OFFLINE</span>
      </div>
    </div>

    <!-- WebSocket URL Config -->
    <div class="input-group">
      <label for="wsUrl">WebSocket Server Endpoint</label>
      <input type="text" id="wsUrl" class="input-field" value="">
    </div>

    <!-- Connect Trigger -->
    <button class="btn btn-connect" id="btnConnect">Connect Virtual ESP</button>

    <!-- Simulated Sensor Actions -->
    <div class="input-group">
      <label>Hardware Pin Simulation</label>
      <div class="sensor-controls">
        <button class="btn btn-power btn-power-on" id="btnPowerOn" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
          </svg>
          Power ON (High)
        </button>
        <button class="btn btn-power btn-power-off" id="btnPowerOff" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18.36 6.64a9 9 0 1 1-12.73 0M12 2v10"/>
          </svg>
          Power CUT (Low)
        </button>
      </div>
    </div>

    <!-- Logger Console -->
    <div class="console-panel">
      <div class="console-header">
        <span class="console-title">Outgoing logs</span>
        <button class="btn-clear" id="btnClear">Clear Logs</button>
      </div>
      <div class="console-logs" id="consoleLogs">
        <div class="log-line info">Initial state. Press Connect to start simulation.</div>
      </div>
    </div>
  </div>

  <script>
    // Autofill server websocket address
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const host = window.location.host || 'localhost:5000';
    const defaultToken = 'HomePulseESP8266SecretToken2026';
    document.getElementById('wsUrl').value = `${protocol}//${host}/ws/esp?token=${defaultToken}`;

    const wsUrlInput = document.getElementById('wsUrl');
    const btnConnect = document.getElementById('btnConnect');
    const btnPowerOn = document.getElementById('btnPowerOn');
    const btnPowerOff = document.getElementById('btnPowerOff');
    const simStatus = document.getElementById('simStatus');
    const consoleLogs = document.getElementById('consoleLogs');
    const btnClear = document.getElementById('btnClear');

    let socket = null;

    // Helper to log console messages
    function logMsg(text, type = 'info') {
      const stamp = new Date().toLocaleTimeString();
      const div = document.createElement('div');
      div.className = `log-line ${type}`;
      div.textContent = `[${stamp}] ${text}`;
      consoleLogs.appendChild(div);
      consoleLogs.scrollTop = consoleLogs.scrollHeight;
    }

    // Toggle simulator controls state
    function setControlsState(isConnected) {
      if (isConnected) {
        simStatus.className = 'sim-status connected';
        simStatus.querySelector('.status-text').textContent = 'CONNECTED';
        btnConnect.className = 'btn btn-connect connected';
        btnConnect.textContent = 'Disconnect Virtual ESP';
        btnPowerOn.disabled = false;
        btnPowerOff.disabled = false;
      } else {
        simStatus.className = 'sim-status disconnected';
        simStatus.querySelector('.status-text').textContent = 'OFFLINE';
        btnConnect.className = 'btn btn-connect';
        btnConnect.textContent = 'Connect Virtual ESP';
        btnPowerOn.disabled = true;
        btnPowerOff.disabled = true;
      }
    }

    // Connect handler
    btnConnect.addEventListener('click', () => {
      if (socket && socket.readyState === WebSocket.OPEN) {
        logMsg("Disconnecting simulator...", "info");
        socket.close();
        return;
      }

      const url = wsUrlInput.value.trim();
      logMsg(`Connecting to WebSocket: ${url}`, "info");

      try {
        socket = new WebSocket(url);

        socket.onopen = () => {
          logMsg("Simulator connection open. Ready to broadcast.", "info");
          setControlsState(true);
        };

        socket.onclose = (e) => {
          logMsg(`Simulator socket closed (Code: ${e.code}).`, "info");
          setControlsState(false);
          socket = null;
        };

        socket.onerror = (err) => {
          logMsg("WebSocket error occurred. Connection failed.", "err");
          console.error(err);
        };
      } catch (err) {
        logMsg(`Error establishing connection: ${err.message}`, "err");
      }
    });

    // Send Power ON state
    btnPowerOn.addEventListener('click', () => {
      if (socket && socket.readyState === WebSocket.OPEN) {
        const payload = JSON.stringify({ light: true });
        socket.send(payload);
        logMsg(`TX -> ${payload}`, "tx");
      } else {
        logMsg("Error: Socket disconnected.", "err");
      }
    });

    // Send Power OFF state
    btnPowerOff.addEventListener('click', () => {
      if (socket && socket.readyState === WebSocket.OPEN) {
        const payload = JSON.stringify({ light: false });
        socket.send(payload);
        logMsg(`TX -> ${payload}`, "tx");
      } else {
        logMsg("Error: Socket disconnected.", "err");
      }
    });

    // Clear logs
    btnClear.addEventListener('click', () => {
      consoleLogs.innerHTML = '';
      logMsg("Logs cleared.", "info");
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HomePulse - Power Timer Switch</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <!-- Google Fonts: Outfit and Plus Jakarta Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Custom controls and styles for Timer page */
    .timer-page-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      min-height: 100vh;
      box-sizing: border-box;
    }

    .timer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-card);
      padding: 0.6rem 1.2rem;
      border-radius: 10px;
      color: var(--text-primary);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
      transition: var(--transition-smooth);
    }

    .btn-back:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateX(-2px);
    }

    .inverter-control-pill {
      background: hsla(230, 20%, 15%, 0.4);
      border: 1px solid var(--border-card);
      border-radius: 12px;
      padding: 0.6rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      backdrop-filter: blur(10px);
    }

    .inverter-label {
      font-family: var(--font-title);
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    /* Switch styling */
    .switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 26px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(255, 255, 255, 0.1);
      transition: .4s;
      border-radius: 34px;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }

    input:checked + .slider {
      background-color: var(--color-blue);
      border-color: var(--color-blue);
      box-shadow: var(--glow-blue);
    }

    input:checked + .slider:before {
      transform: translateX(24px);
    }

    /* Custom Timer Cards */
    .timer-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .status-badge-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding-bottom: 1rem;
    }

    .esp32-status-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--color-red);
      transition: var(--transition-smooth);
    }

    .esp32-status-dot.online {
      background: var(--color-green);
      box-shadow: var(--glow-green);
    }

    .manual-relay-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2.5rem 1.5rem;
    }

    .relay-control-btn {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 2px solid var(--border-card);
      background: rgba(255, 255, 255, 0.02);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      margin: 1.5rem 0;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .relay-control-btn svg {
      width: 45px;
      height: 45px;
      stroke: var(--text-muted);
      transition: var(--transition-smooth);
    }

    .relay-control-btn.active {
      border-color: var(--color-green);
      background: hsla(142, 70%, 50%, 0.1);
      box-shadow: 0 0 30px hsla(142, 70%, 50%, 0.3);
    }

    .relay-control-btn.active svg {
      stroke: var(--color-green);
      filter: drop-shadow(0 0 8px var(--color-green));
    }

    .relay-status-text {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 1px;
      margin-top: 0.5rem;
    }

    .relay-status-text.on {
      color: var(--color-green);
    }
    .relay-status-text.off {
      color: var(--text-muted);
    }

    /* Inputs styling */
    .time-picker-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin: 1.5rem 0;
    }

    .time-unit-box {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .time-unit-box input {
      width: 65px;
      height: 60px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-card);
      border-radius: 12px;
      text-align: center;
      font-size: 1.8rem;
      font-weight: 700;
      color: #fff;
      outline: none;
      transition: var(--transition-smooth);
    }

    .time-unit-box input:focus {
      border-color: var(--color-blue);
      box-shadow: var(--glow-blue);
    }

    .time-unit-box label {
      font-size: 0.75rem;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-top: 0.4rem;
      font-weight: 600;
    }

    .time-colon {
      font-size: 2rem;
      font-weight: 700;
      color: var(--text-secondary);
      transform: translateY(-10px);
    }

    .form-row {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      width: 100%;
      margin-bottom: 1.25rem;
    }

    .form-row label {
      font-size: 0.85rem;
      color: var(--text-secondary);
      font-weight: 600;
    }

    .select-dropdown {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-card);
      border-radius: 10px;
      padding: 0.8rem 1rem;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      cursor: pointer;
      transition: var(--transition-smooth);
    }

    .select-dropdown:focus {
      border-color: var(--color-blue);
    }

    .select-dropdown option {
      background: #0f1016;
      color: #fff;
    }

    /* Buttons */
    .btn {
      width: 100%;
      padding: 0.85rem;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: var(--transition-smooth);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-blue {
      background: linear-gradient(135deg, var(--color-blue) 0%, #1d4ed8 100%);
      color: #fff;
    }

    .btn-blue:hover {
      filter: brightness(1.1);
      box-shadow: var(--glow-blue);
    }

    .btn-red {
      background: linear-gradient(135deg, var(--color-red) 0%, #dc2626 100%);
      color: #fff;
    }

    .btn-red:hover {
      filter: brightness(1.1);
      box-shadow: var(--glow-red);
    }

    /* Timer Countdown Screen */
    .countdown-timer-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 0;
    }

    .countdown-circle-text {
      font-size: 2.8rem;
      font-weight: 800;
      color: var(--color-blue);
      font-family: var(--font-title);
      text-shadow: var(--glow-blue);
      margin-bottom: 0.5rem;
    }

    .countdown-action-desc {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 1.5rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
    }

    /* Alarm styling */
    .alarm-time-box {
      margin: 1.5rem 0;
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .alarm-input {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-card);
      border-radius: 12px;
      padding: 0.8rem 1.5rem;
      font-size: 1.8rem;
      font-weight: 700;
      color: #fff;
      text-align: center;
      outline: none;
      transition: var(--transition-smooth);
      font-family: var(--font-title);
    }

    .alarm-input:focus {
      border-color: var(--color-blue);
      box-shadow: var(--glow-blue);
    }

    .alarm-switch-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border-card);
      border-radius: 12px;
      margin-bottom: 1.5rem;
    }

    /* Password Overlay styling */
    .password-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(10, 11, 16, 0.96);
      backdrop-filter: blur(25px);
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .password-card {
      max-width: 420px;
      width: 100%;
      padding: 3rem 2rem;
      border-radius: 24px;
      text-align: center;
      border: 1px solid var(--border-card);
    }

    .password-card h2 {
      font-family: var(--font-title);
      color: var(--text-primary);
      margin: 1rem 0;
      font-size: 1.6rem;
    }

    .password-card p {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 1.8rem;
    }

    .pwd-input-group {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .pwd-input-group input {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--border-card);
      border-radius: 12px;
      padding: 0.9rem 1.2rem;
      color: #fff;
      font-size: 1.1rem;
      outline: none;
      text-align: center;
      transition: var(--transition-smooth);
    }

    .pwd-input-group input:focus {
      border-color: var(--color-blue);
      box-shadow: var(--glow-blue);
    }

    .pwd-input-group button {
      background: linear-gradient(135deg, var(--color-blue) 0%, #1d4ed8 100%);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 0.9rem;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: var(--transition-smooth);
    }

    .pwd-input-group button:hover {
      filter: brightness(1.1);
      box-shadow: var(--glow-blue);
    }

    .btn-back-dashboard {
      display: inline-block;
      margin-top: 1rem;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
      transition: var(--transition-smooth);
    }

    .btn-back-dashboard:hover {
      color: #fff;
    }

    .error-msg {
      color: #ef4444;
      font-size: 0.85rem;
      margin-top: 0.5rem;
      min-height: 20px;
    }

    /* Mobile media overrides */
    @media (max-width: 768px) {
      .timer-header {
        flex-direction: column;
        align-items: stretch;
      }
      .inverter-control-pill {
        justify-content: space-between;
      }
      .time-unit-box input {
        width: 55px;
        height: 50px;
        font-size: 1.5rem;
      }
    }

    /* Toast Alerts style */
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 10000;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }

    .toast-alert {
      background: rgba(30, 41, 59, 0.85);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #f8fafc;
      padding: 12px 20px;
      border-radius: 12px;
      font-size: 0.9rem;
      font-family: inherit;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 250px;
      max-width: 350px;
      transform: translateX(120%);
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease;
      opacity: 0;
      pointer-events: auto;
    }

    .toast-alert.show {
      transform: translateX(0);
      opacity: 1;
    }

    .toast-icon {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      font-weight: bold;
    }
    
    .toast-icon.info {
      background: rgba(59, 130, 246, 0.2);
      color: #3b82f6;
    }
    
    .toast-icon.success {
      background: rgba(34, 197, 94, 0.2);
      color: #22c55e;
    }
    
    .toast-icon.warning {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
    }
  </style>
</head>
<body>
  
  <!-- Lock Screen Overlay -->
  <div id="passwordOverlay" class="password-overlay">
    <div class="password-card glass-card">
      <div class="logo-icon-wrapper" style="margin: 0 auto;">
        <svg class="logo-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h2>Secure Access</h2>
      <p>Enter the timer access password to proceed.</p>
      <div class="pwd-input-group">
        <input type="password" id="timerPassword" placeholder="••••••••" autofocus>
        <button id="btnVerifyPassword">Unlock Controls</button>
      </div>
      <div class="error-msg" id="passwordError"></div>
      <a href="index.html" class="btn-back-dashboard">Cancel & Go Back</a>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- Ambient background -->
  <div class="glass-bg-container">
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
  </div>

  <!-- Main controls screen (hidden until unlocked) -->
  <div class="app-container" id="mainContainer" style="display:none;">
    <div class="timer-page-container">
      
      <header class="timer-header">
        <a href="index.html" class="btn-back">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
          Back to Dashboard
        </a>

        <div class="inverter-control-pill">
          <span class="inverter-label">Control Main Source</span>
          <label class="switch">
            <input type="checkbox" id="inverterSwitch">
            <span class="slider"></span>
          </label>
        </div>
      </header>

      <div class="timer-grid">
        
        <!-- ESP32 Connection and Manual Switch Card -->
        <section class="card glass-card manual-relay-card">
          <div class="status-badge-row">
            <h3>Manual Override</h3>
            <div style="display: flex; align-items: center; gap: 0.5rem;">
              <span class="esp32-status-dot" id="espStatusDot"></span>
              <span id="espStatusText" style="font-size: 0.85rem; font-weight: 600; color: var(--text-secondary);">Offline</span>
            </div>
          </div>
          
          <button class="relay-control-btn" id="btnRelayToggle" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path>
              <line x1="12" y1="2" x2="12" y2="12"></line>
            </svg>
          </button>
          
          <span style="font-size: 0.8rem; text-transform: uppercase; color: var(--text-secondary); font-weight: 600;">Switch State</span>
          <div class="relay-status-text off" id="relayStatusText">DISCONNECTED</div>
        </section>

        <!-- Timer Control Card -->
        <section class="card glass-card">
          <div class="card-header">
            <h3>Power Timer</h3>
            <div class="card-icon" style="background: hsla(210, 90%, 55%, 0.1);">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 14"></polyline>
              </svg>
            </div>
          </div>
          
          <!-- Timer Setup -->
          <div id="timerSetupPanel">
            <div class="time-picker-container">
              <div class="time-unit-box">
                <input type="number" id="timerHours" min="0" max="23" placeholder="00">
                <label>Hrs</label>
              </div>
              <span class="time-colon">:</span>
              <div class="time-unit-box">
                <input type="number" id="timerMinutes" min="0" max="59" placeholder="00">
                <label>Min</label>
              </div>
              <span class="time-colon">:</span>
              <div class="time-unit-box">
                <input type="number" id="timerSeconds" min="0" max="59" placeholder="00">
                <label>Sec</label>
              </div>
            </div>

            <div class="form-row">
              <label for="timerAction">When Countdown Ends</label>
              <select class="select-dropdown" id="timerAction">
                <option value="off">Turn Relay OFF</option>
                <option value="on">Turn Relay ON</option>
              </select>
            </div>

            <button class="btn btn-blue" id="btnStartTimer">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon points="5 3 19 12 5 21 5 3"></polygon>
              </svg>
              Start Countdown
            </button>
          </div>

          <!-- Active Timer Display -->
          <div id="timerCountdownPanel" class="countdown-timer-panel" style="display: none;">
            <div class="countdown-circle-text" id="countdownText">00:00:00</div>
            <div class="countdown-action-desc" id="countdownActionText">Remaining to turn Relay OFF</div>
            <button class="btn btn-red" id="btnCancelTimer">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect>
              </svg>
              Cancel Timer
            </button>
          </div>
        </section>

        <!-- Scheduled Alarm Card -->
        <section class="card glass-card">
          <div class="card-header">
            <h3>Scheduled Alarm</h3>
            <div class="card-icon" style="background: hsla(270, 90%, 55%, 0.1);">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
              </svg>
            </div>
          </div>

          <div class="alarm-time-box">
            <input type="time" class="alarm-input" id="alarmTime" value="16:00">
          </div>
          <div id="alarmFormattedDisplay" style="text-align: center; font-size: 1.1rem; font-weight: 700; color: var(--color-blue); margin-bottom: 1.5rem; text-shadow: var(--glow-blue);">04:00 PM</div>

          <div class="form-row">
            <label for="alarmAction">Alarm Trigger Action</label>
            <select class="select-dropdown" id="alarmAction">
              <option value="off">Turn Relay OFF</option>
              <option value="on">Turn Relay ON</option>
            </select>
          </div>

          <div class="alarm-switch-row">
            <span style="font-size: 0.9rem; font-weight: 600; color: var(--text-primary);">Enable Scheduled Trigger</span>
            <label class="switch">
              <input type="checkbox" id="alarmEnableSwitch">
              <span class="slider"></span>
            </label>
          </div>
        </section>

      </div>
    </div>
  </div>

  <script>
    // Security verification
    const passwordOverlay = document.getElementById('passwordOverlay');
    const mainContainer = document.getElementById('mainContainer');
    const timerPasswordInput = document.getElementById('timerPassword');
    const btnVerifyPassword = document.getElementById('btnVerifyPassword');
    const passwordError = document.getElementById('passwordError');

    // Timer and control bindings
    const inverterSwitch = document.getElementById('inverterSwitch');
    const espStatusDot = document.getElementById('espStatusDot');
    const espStatusText = document.getElementById('espStatusText');
    const btnRelayToggle = document.getElementById('btnRelayToggle');
    const relayStatusText = document.getElementById('relayStatusText');

    // Countdown Panel
    const timerSetupPanel = document.getElementById('timerSetupPanel');
    const timerCountdownPanel = document.getElementById('timerCountdownPanel');
    const timerHours = document.getElementById('timerHours');
    const timerMinutes = document.getElementById('timerMinutes');
    const timerSeconds = document.getElementById('timerSeconds');
    const timerAction = document.getElementById('timerAction');
    const btnStartTimer = document.getElementById('btnStartTimer');
    const countdownText = document.getElementById('countdownText');
    const countdownActionText = document.getElementById('countdownActionText');
    const btnCancelTimer = document.getElementById('btnCancelTimer');

    // Alarm Panel
    const alarmTime = document.getElementById('alarmTime');
    const alarmAction = document.getElementById('alarmAction');
    const alarmEnableSwitch = document.getElementById('alarmEnableSwitch');

    let socket = null;
    let localTimerState = null;
    let localTimerInterval = null;
    let lastEsp32Connected = null;

    function getCurrentTimeStr() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      return `${h}:${m}`;
    }

    function showToast(message, type = 'info') {
      const container = document.getElementById('toastContainer');
      if (!container) return;
      
      const toast = document.createElement('div');
      toast.className = `toast-alert`;
      
      let iconHtml = '';
      if (type === 'success') {
        iconHtml = '<span class="toast-icon success">✓</span>';
      } else if (type === 'warning') {
        iconHtml = '<span class="toast-icon warning">!</span>';
      } else {
        iconHtml = '<span class="toast-icon info">i</span>';
      }
      
      toast.innerHTML = `
        ${iconHtml}
        <div style="flex: 1;">${message}</div>
      `;
      
      container.appendChild(toast);
      
      // Force reflow
      toast.offsetHeight;
      toast.classList.add('show');
      
      setTimeout(() => {
        toast.classList.remove('show');
        toast.addEventListener('transitionend', () => {
          toast.remove();
        });
      }, 3500);
    }

    // Check if session token already exists in sessionStorage to skip password entry
    if (sessionStorage.getItem('timer_unlocked') === 'true') {
      unlockPage();
    }

    btnVerifyPassword.addEventListener('click', attemptUnlock);
    timerPasswordInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') attemptUnlock();
    });

    function attemptUnlock() {
      const password = timerPasswordInput.value;
      if (!password) {
        passwordError.textContent = "Please enter password";
        return;
      }
      
      fetch('/api/verify-timer-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password })
      })
      .then(r => r.json())
      .then(data => {
        if (data.success) {
          sessionStorage.setItem('timer_unlocked', 'true');
          unlockPage();
          showToast('Dashboard unlocked successfully', 'success');
        } else {
          passwordError.textContent = "Incorrect password! Try again.";
          showToast('Incorrect password entered', 'warning');
          timerPasswordInput.value = "";
          timerPasswordInput.focus();
        }
      })
      .catch(e => {
        passwordError.textContent = "Server communication error.";
        showToast('Communication error occurred', 'warning');
      });
    }

    function unlockPage() {
      passwordOverlay.style.display = 'none';
      mainContainer.style.display = 'block';
      initializeSocket();
    }

    // WebSocket Logic
    function initializeSocket() {
      const wsProto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const wsUrl = `${wsProto}//${window.location.host}/ws/ui`;
      
      socket = new WebSocket(wsUrl);

      socket.onopen = () => {
        // Connected
      };

      socket.onmessage = (event) => {
        try {
          const payload = JSON.parse(event.data);
          if (payload.event === 'timer_init' || payload.event === 'timer_update') {
            updateTimerPage(payload.data);
          }
        } catch (e) {
          // parse error
        }
      };

      socket.onclose = () => {
        // Retry connection in 3 seconds
        setTimeout(initializeSocket, 3000);
      };
    }

    function sendCommand(action, data = {}) {
      if (socket && socket.readyState === WebSocket.OPEN) {
        socket.send(JSON.stringify({ action, ...data }));
      }
    }

    // UI Updates
    function updateTimerPage(settings) {
      localTimerState = settings;

      // Toast alert on connect/disconnect transition
      if (lastEsp32Connected !== null && lastEsp32Connected !== settings.esp32Connected) {
        if (settings.esp32Connected) {
          showToast('ESP32 Switch Relay Online', 'success');
        } else {
          showToast('ESP32 Switch Relay Offline', 'warning');
        }
      }
      lastEsp32Connected = settings.esp32Connected;

      // 1. ESP32 Connection and Relay state
      if (settings.esp32Connected) {
        espStatusDot.className = 'esp32-status-dot online';
        espStatusText.textContent = 'Online';
        btnRelayToggle.removeAttribute('disabled');
        
        if (settings.effectiveRelayState === 'on') {
          btnRelayToggle.className = 'relay-control-btn active';
          relayStatusText.className = 'relay-status-text on';
          relayStatusText.textContent = 'POWER SWITCH ON';
        } else {
          btnRelayToggle.className = 'relay-control-btn';
          relayStatusText.className = 'relay-status-text off';
          if (settings.controlMainSource && !settings.lastMainsState) {
            relayStatusText.textContent = 'POWER SWITCH OFF (MAINS OFFLINE)';
          } else {
            relayStatusText.textContent = 'POWER SWITCH OFF';
          }
        }
      } else {
        espStatusDot.className = 'esp32-status-dot';
        espStatusText.textContent = 'Offline';
        btnRelayToggle.setAttribute('disabled', 'true');
        btnRelayToggle.className = 'relay-control-btn';
        relayStatusText.className = 'relay-status-text off';
        relayStatusText.textContent = 'DISCONNECTED';
      }

      // 2. Control Main Source
      inverterSwitch.checked = !!settings.controlMainSource;

      // 3. Alarm State
      alarmTime.value = settings.alarm.time || getCurrentTimeStr();
      alarmAction.value = settings.alarm.action || 'off';
      alarmEnableSwitch.checked = !!settings.alarm.active;

      if (settings.alarm.active) {
        alarmTime.disabled = true;
        alarmAction.disabled = true;
      } else {
        alarmTime.disabled = false;
        alarmAction.disabled = false;
      }
      
      const formattedTime = convert24hTo12h(settings.alarm.time || getCurrentTimeStr());
      document.getElementById('alarmFormattedDisplay').textContent = formattedTime;

      // 4. Timer Countdown State
      if (settings.timer.active && settings.timer.remaining > 0) {
        timerSetupPanel.style.display = 'none';
        timerCountdownPanel.style.display = 'flex';
        
        countdownActionText.textContent = `Remaining to turn Relay ${settings.timer.action.toUpperCase()}`;
        startLocalCountdown(settings.timer.remaining);
      } else {
        clearInterval(localTimerInterval);
        timerCountdownPanel.style.display = 'none';
        timerSetupPanel.style.display = 'block';
      }
    }

    function formatTime(secs) {
      const h = Math.floor(secs / 3600);
      const m = Math.floor((secs % 3600) / 60);
      const s = secs % 60;
      return [h, m, s].map(v => String(v).padStart(2, '0')).join(':');
    }

    function convert24hTo12h(timeStr) {
      if (!timeStr) return "";
      const [hStr, mStr] = timeStr.split(':');
      let h = parseInt(hStr);
      const ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12;
      h = h ? h : 12;
      return `${String(h).padStart(2, '0')}:${mStr} ${ampm}`;
    }

    function startLocalCountdown(remainingSeconds) {
      clearInterval(localTimerInterval);
      countdownText.textContent = formatTime(remainingSeconds);

      localTimerInterval = setInterval(() => {
        if (remainingSeconds > 0) {
          remainingSeconds--;
          countdownText.textContent = formatTime(remainingSeconds);
        } else {
          clearInterval(localTimerInterval);
        }
      }, 1000);
    }

    // UI Event Listeners
    inverterSwitch.addEventListener('change', () => {
      sendCommand('set_control_main_source', { value: inverterSwitch.checked });
      showToast(`Control Main Source turned ${inverterSwitch.checked ? 'ON' : 'OFF'}`, 'info');
    });

    btnRelayToggle.addEventListener('click', () => {
      if (!localTimerState || !localTimerState.esp32Connected) return;
      const targetState = localTimerState.effectiveRelayState === 'on' ? 'off' : 'on';
      sendCommand('set_relay', { value: targetState });
      showToast(`Manual Override: turning Switch ${targetState.toUpperCase()}`, 'info');
    });

    btnStartTimer.addEventListener('click', () => {
      const h = parseInt(timerHours.value) || 0;
      const m = parseInt(timerMinutes.value) || 0;
      const s = parseInt(timerSeconds.value) || 0;
      const totalSeconds = (h * 3600) + (m * 60) + s;

      if (totalSeconds <= 0) {
        alert("Please specify a duration greater than 0.");
        return;
      }

      sendCommand('set_timer', {
        active: true,
        duration: totalSeconds,
        timerAction: timerAction.value
      });
      showToast(`Timer configured to turn Relay ${timerAction.value.toUpperCase()} in ${h}h ${m}m ${s}s`, 'success');
    });

    btnCancelTimer.addEventListener('click', () => {
      sendCommand('set_timer', {
        active: false,
        duration: 0,
        timerAction: 'off'
      });
      showToast('Timer cancelled successfully', 'warning');
    });

    function saveAlarmSettings() {
      sendCommand('set_alarm', {
        active: alarmEnableSwitch.checked,
        time: alarmTime.value,
        alarmAction: alarmAction.value
      });
      
      if (alarmEnableSwitch.checked) {
        const formatted = convert24hTo12h(alarmTime.value);
        showToast(`Alarm enabled for ${formatted} (${alarmAction.value.toUpperCase()})`, 'success');
      } else {
        showToast('Alarm disabled', 'warning');
      }
    }

    alarmTime.addEventListener('change', saveAlarmSettings);
    alarmAction.addEventListener('change', saveAlarmSettings);
    alarmEnableSwitch.addEventListener('change', saveAlarmSettings);
  </script>
</body>
</html>
